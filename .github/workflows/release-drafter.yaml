---
name: Release Drafter

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update_release_draft:
    name: Draft release
    runs-on: ubuntu-24.04
    steps:
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@73b95fa1c286dfd6802a4f949b07dad6149f2b0f # v7.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
